<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // Redirect to the app with the path encoded in the hash
      const path = window.location.pathname.replace('/Greyed-teachers', '');
      window.location.replace(
        window.location.origin + '/Greyed-teachers/#' + (path || '/')
      );
    </script>
  </head>
  <body></body>
</html>
